; ════════════════════════════════════════════════════════════════════════════
;  Hello Moving API — PHP runtime overrides (cPanel PHP-FPM reads .user.ini)
;
;  WHY: PHP's stock upload limits (upload_max_filesize=2M, post_max_size=8M) are
;  far smaller than the photos/documents customers actually send — phone photos
;  are routinely 3–12 MB. When the POST body exceeds post_max_size, PHP throws
;  away the whole request body, so the upload silently failed with a misleading
;  "missing field" error. Raising these here fixes uploads at the source.
;
;  NOTE: changes to .user.ini are cached by PHP for user_ini.cache_ttl seconds
;  (default 300s / 5 min), so allow a few minutes to take effect after deploy.
;  Keep post_max_size >= upload_max_filesize, and >= storage_dir 'upload_max_bytes'.
; ════════════════════════════════════════════════════════════════════════════

upload_max_filesize = 20M
post_max_size = 25M
max_file_uploads = 20
memory_limit = 256M
max_execution_time = 60
