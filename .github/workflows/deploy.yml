name: Deploy to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — list files without uploading'
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    name: FTP Deploy to cPanel
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deploy dependencies
        run: npm ci

      - name: Stamp service worker cache version with commit SHA
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          sed -i "s/const CACHE_VERSION = '[^']*'/const CACHE_VERSION = '${SHORT_SHA}'/" sw.js
          echo "SW cache version set to ${SHORT_SHA}"

      - name: Deploy via FTP
        if: ${{ inputs.dry_run != true }}
        env:
          FTP_HOST:         ${{ secrets.FTP_HOST }}
          FTP_USERNAME:     ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD:     ${{ secrets.FTP_PASSWORD }}
          FTP_PORT:         ${{ secrets.FTP_PORT }}
          FTP_REMOTE:       public_html
          FTP_SECURE:       true
          SUPABASE_URL:     ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node deploy.js

      - name: Dry run — list files that would be uploaded
        if: ${{ inputs.dry_run == true }}
        run: |
          echo "=== Files that would be deployed ==="
          find . -not -path './.git*' \
                 -not -path './node_modules*' \
                 -not -path './.github*' \
                 -not -path './.claude*' \
                 -not -path './tests*' \
                 -not -name 'serve.js' \
                 -not -name 'deploy.js' \
                 -not -name 'package*.json' \
                 -not -name 'CLAUDE.md' \
                 -not -name '*.test.js' \
                 -type f | sort

      - name: Verify deployment — key files reachable
        if: ${{ inputs.dry_run != true }}
        env:
          SITE: https://${{ secrets.SITE_URL }}
        run: |
          check() {
            STATUS=$(curl -k -o /dev/null -s -w "%{http_code}" "$1") || STATUS="ERR"
            if [ "$STATUS" != "200" ]; then
              echo "FAIL $1 → HTTP $STATUS"
              exit 1
            fi
            SIZE=$(curl -k -sI "$1" | grep -i content-length | awk '{print $2}' | tr -d '\r')
            echo "OK   $1 → HTTP $STATUS (${SIZE} bytes)"
          }
          check "$SITE/js/modules/website/wmcServices.js"
          check "$SITE/js/services/contentLoader.js"
          check "$SITE/index.html"
          check "$SITE/wmc/wmcDashboard.html"
