name: Deploy to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — list files without uploading'
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    name: FTP Deploy to cPanel
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install deploy dependencies
        run: npm ci

      - name: Stamp service worker cache version with commit SHA
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          sed -i "s/const CACHE_VERSION = '[^']*'/const CACHE_VERSION = '${SHORT_SHA}'/" sw.js
          echo "SW cache version set to ${SHORT_SHA}"

      - name: Deploy via FTP
        if: ${{ inputs.dry_run != true }}
        env:
          FTP_HOST:         ${{ secrets.FTP_HOST }}
          FTP_USERNAME:     ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD:     ${{ secrets.FTP_PASSWORD }}
          FTP_PORT:         ${{ secrets.FTP_PORT }}
          FTP_REMOTE:       public_html
          FTP_SECURE:       true
          # Self-hosted PHP API base — set this secret to your hm-api URL, e.g.
          # https://hello-moving.com/hm-api
          API_BASE:         ${{ secrets.API_BASE }}
          # API key — must EXACTLY match 'api_key' in hm-api/_config.php (or leave
          # both empty to disable the gate). Injected into env.js as window.API_KEY.
          API_KEY:          ${{ secrets.API_KEY }}
        run: node deploy.js

      - name: Dry run — list files that would be uploaded
        if: ${{ inputs.dry_run == true }}
        run: |
          echo "=== Files that would be deployed ==="
          find . -not -path './.git*' \
                 -not -path './node_modules*' \
                 -not -path './.github*' \
                 -not -path './.claude*' \
                 -not -path './tests*' \
                 -not -name 'serve.js' \
                 -not -name 'deploy.js' \
                 -not -name 'package*.json' \
                 -not -name 'CLAUDE.md' \
                 -not -name '*.test.js' \
                 -type f | sort

      - name: Verify deployment — key files reachable
        if: ${{ inputs.dry_run != true }}
        # Best-effort post-deploy reachability probe. The FTP upload step above is
        # the source of truth for deploy success; this check is INFORMATIONAL and
        # never fails the build. The host WAF intermittently returns 415 to the CI
        # runner's requests (a normal browser gets 200), so a transient block here
        # must not turn a good deploy red — failures are emitted as warnings.
        env:
          SITE: https://${{ secrets.SITE_URL }}
        run: |
          UA='Mozilla/5.0 (compatible; HelloMovingDeploy/1.0)'
          check() {
            # Retry to ride out transient WAF blocks / cold caches.
            STATUS=$(curl -k -s -o /dev/null -w "%{http_code}" \
                       -A "$UA" -H 'Accept: */*' \
                       --retry 4 --retry-delay 3 --retry-all-errors \
                       --max-time 20 "$1") || STATUS="ERR"
            if [ "$STATUS" -ge 200 ] 2>/dev/null && [ "$STATUS" -lt 400 ] 2>/dev/null; then
              echo "OK    $1 → HTTP $STATUS"
            else
              echo "::warning title=Post-deploy check::$1 returned HTTP $STATUS (often a host WAF block on the CI runner — verify manually in a browser)"
            fi
          }
          check "$SITE/index.html"
          check "$SITE/admin.html"
          check "$SITE/wmcDashboard.html"
          check "$SITE/js/services/contentLoader.js"
          check "$SITE/js/modules/website/wmcServices.js"
          echo "Reachability probe complete (informational — does not gate the deploy)."
