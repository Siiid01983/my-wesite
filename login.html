<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0a1f44" />
<meta name="robots" content="noindex, nofollow" />
<title>マイページ ログイン — Hello Moving</title>

<link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=Noto+Serif+JP:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

<style>
  :root {
    --navy: #0a1f44;
    --navy-2: #112a55;
    --ink: #0b0f17;
    --gray-1: #3a4150;
    --gray-2: #6b7280;
    --gray-3: #9aa1ad;
    --line: #e6e8ec;
    --line-2: #eef0f3;
    --bg: #ffffff;
    --bg-soft: #f7f8fa;
    --danger: #c0392b;
    --radius: 14px;
    --radius-sm: 10px;
    --font-jp: "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    --font-serif: "Noto Serif JP", "Hiragino Mincho ProN", "Yu Mincho", serif;
    --font-en: "Inter", "Helvetica Neue", Arial, sans-serif;
    --easing: cubic-bezier(.2,.7,.2,1);
  }
  *, *::before, *::after { box-sizing: border-box; }
  * { margin: 0; padding: 0; }
  body {
    font-family: var(--font-jp);
    color: var(--ink);
    background: var(--bg-soft);
    line-height: 1.8;
    letter-spacing: .03em;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; cursor: pointer; background: none; border: 0; color: inherit; }

  .auth-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .auth-card {
    width: 100%;
    max-width: 440px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: 0 24px 60px rgba(11,15,23,.08);
    padding: 44px 38px 38px;
  }
  .brand {
    text-align: center;
    margin-bottom: 34px;
  }
  .brand-logo {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 52px; height: 52px;
    border-radius: 14px;
    background: var(--navy);
    color: #fff;
    font-family: var(--font-en);
    font-weight: 700;
    font-size: 26px;
    margin-bottom: 18px;
  }
  .brand-name {
    font-family: var(--font-en);
    font-weight: 600;
    font-size: 15px;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--navy);
  }
  .auth-title {
    font-family: var(--font-serif);
    font-weight: 500;
    font-size: 21px;
    letter-spacing: .06em;
    text-align: center;
    margin-bottom: 6px;
  }
  .auth-sub {
    text-align: center;
    font-size: 13px;
    color: var(--gray-2);
    margin-bottom: 30px;
    line-height: 1.9;
  }
  .field { margin-bottom: 20px; }
  .field label {
    display: block;
    font-size: 12.5px;
    font-weight: 500;
    letter-spacing: .06em;
    color: var(--gray-1);
    margin-bottom: 8px;
  }
  .field input {
    width: 100%;
    padding: 13px 15px;
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    font-family: var(--font-jp);
    font-size: 15px;
    color: var(--ink);
    background: var(--bg);
    transition: border-color .2s var(--easing), box-shadow .2s var(--easing);
  }
  .field input::placeholder { color: var(--gray-3); }
  .field input:focus {
    outline: none;
    border-color: var(--navy);
    box-shadow: 0 0 0 3px rgba(10,31,68,.08);
  }
  .field .hint {
    font-size: 11.5px;
    color: var(--gray-3);
    margin-top: 6px;
  }
  .admin-note {
    font-size: 11.5px;
    color: var(--gray-2);
    text-align: center;
    margin: -4px 0 16px;
    letter-spacing: .04em;
  }
  /* Reference field is dimmed + marked optional once an admin email is typed. */
  .field.optional { opacity: .5; }
  .field.optional input { background: var(--bg-soft); }
  .btn-login {
    width: 100%;
    padding: 15px;
    border-radius: 999px;
    background: var(--ink);
    color: #fff;
    font-weight: 500;
    font-size: 15px;
    letter-spacing: .08em;
    transition: background .25s var(--easing), transform .25s var(--easing), box-shadow .25s var(--easing);
    margin-top: 6px;
  }
  .btn-login:hover:not(:disabled) {
    background: var(--navy);
    transform: translateY(-1px);
    box-shadow: 0 10px 24px rgba(11,15,23,.18);
  }
  .btn-login:disabled { opacity: .6; cursor: not-allowed; }

  .alert {
    display: none;
    align-items: flex-start;
    gap: 8px;
    background: #fdecea;
    border: 1px solid #f3c6c0;
    color: var(--danger);
    border-radius: var(--radius-sm);
    padding: 11px 14px;
    font-size: 12.5px;
    line-height: 1.7;
    margin-bottom: 22px;
  }
  .alert.show { display: flex; }

  .auth-foot {
    text-align: center;
    margin-top: 26px;
    padding-top: 22px;
    border-top: 1px solid var(--line-2);
    font-size: 12px;
    color: var(--gray-3);
    line-height: 2;
  }
  .auth-foot a { color: var(--gray-1); border-bottom: 1px solid var(--line); }
  .auth-foot a:hover { color: var(--navy); }

  .page-foot {
    text-align: center;
    padding: 20px;
    font-size: 11px;
    color: var(--gray-3);
    font-family: var(--font-en);
    letter-spacing: .12em;
  }

  @media (max-width: 480px) {
    .auth-card { padding: 36px 24px 30px; border-radius: 12px; }
    .auth-wrap { padding: 24px 14px; }
  }
</style>
<script src="js/utils/brandSize.js"></script><!-- single-source logo sizing -->
</head>
<body>
  <main class="auth-wrap">
    <div class="auth-card">
      <div class="brand">
        <div class="brand-logo"><img src="/icons/icon.svg" alt="Hello Moving" style="width:100%;height:100%;object-fit:contain;border-radius:inherit;display:block"></div>
        <div class="brand-name">Hello Moving</div>
      </div>

      <h1 class="auth-title">マイページ ログイン</h1>
      <p class="auth-sub">ご予約時のメールアドレスと予約番号（確認番号）を入力してください。</p>

      <div class="alert" id="authAlert" role="alert" aria-live="assertive">
        <span id="authAlertMsg"></span>
      </div>

      <!-- Email + Confirmation Number login form -->
      <form id="loginForm" novalidate>
        <div class="field">
          <label for="email">メールアドレス</label>
          <input type="email" id="email" name="email" autocomplete="email"
                 placeholder="you@example.com" required />
          <div class="hint">ご予約時に登録されたメールアドレスをご入力ください。</div>
        </div>
        <div class="field" id="referenceField">
          <label for="reference">予約番号（確認番号）</label>
          <input type="text" id="reference" name="reference" autocomplete="off"
                 inputmode="text" placeholder="HM-00000000-XXXX" required />
          <div class="hint">ご予約確認メールに記載の予約番号をご入力ください。</div>
        </div>
        <p class="admin-note" id="adminNote">管理者はメールアドレスのみでログインできます</p>
        <button type="submit" class="btn-login" id="loginBtn">ログイン</button>
      </form>

      <div class="auth-foot">
        予約番号がご不明な場合は、ご予約確認メールをご確認ください。<br />
        ご不明な点は <a href="index.html#contact">お問い合わせ</a> ください。
      </div>
    </div>
  </main>

  <footer class="page-foot">© Hello Moving — Customer Portal</footer>

  <!-- API infrastructure (reused, unmodified) -->
  <script src="js/services/diagnostics.js"></script>
  <script src="js/lib/apiClient.js"></script>
  <script src="js/config/appConfig.js"></script>
  <script src="js/config/env.public.js"></script><!-- committed same-origin fallback -->
  <script src="js/config/env.js" onerror="console.warn('[Portal] js/config/env.js missing — using env.public.js fallback')"></script>
  <script src="js/services/dataClient.js"></script>
  <script src="bookingService.js"></script>
  <!-- Portal auth (API Auth Magic Link + session helper) -->
  <script src="js/portal/portalLogin.js?v=2"></script>
  <script src="js/portal/portalAuth.js"></script>

  <script>
  (function () {
    'use strict';
    const form     = document.getElementById('loginForm');
    const btn      = document.getElementById('loginBtn');
    const alertEl  = document.getElementById('authAlert');
    const alertMsg = document.getElementById('authAlertMsg');

    function showError(msg) { alertMsg.textContent = msg; alertEl.classList.add('show'); }
    function clearError()   { alertEl.classList.remove('show'); }

    // Admins log in with the email alone. Mirror the reference-optional state in
    // the UI as soon as an admin email is recognised. (The server enforces the
    // allowlist; this only relaxes the form.)
    function _isAdmin(email) {
      return !!(window.PortalLogin &&
                typeof PortalLogin.isAdminEmail === 'function' &&
                PortalLogin.isAdminEmail(email));
    }
    const emailEl = document.getElementById('email');
    const refField = document.getElementById('referenceField');
    function syncAdminUI() {
      const admin = _isAdmin(emailEl.value.trim());
      if (refField) refField.classList.toggle('optional', admin);
    }
    emailEl.addEventListener('input', syncAdminUI);

    // One-time handoff from the index.html "My Booking" modal. The modal already
    // verified this email + reference against hm-api/auth.php, so consume the
    // handoff once and silently establish the portal session (no second click).
    // Falls back to the manual form if the handoff is stale or login now fails.
    (function consumeBookingHandoff() {
      let raw;
      try { raw = sessionStorage.getItem('hm_portal_handoff'); } catch (_) { raw = null; }
      if (!raw) return;
      try { sessionStorage.removeItem('hm_portal_handoff'); } catch (_) {} // consume once

      let data = null;
      try { data = JSON.parse(raw); } catch (_) { data = null; }
      if (!data || !data.email || !data.ref) return;
      // Reject stale handoffs (>5 min) so a leftover entry can't auto-login later.
      if (!data.ts || (Date.now() - data.ts) > 5 * 60 * 1000) return;

      // Prefill so that, if auto-login fails, the user only has to press ログイン.
      emailEl.value = data.email;
      document.getElementById('reference').value = data.ref;
      syncAdminUI();

      if (!window.PortalLogin || !PortalLogin.isConfigured()) return;

      btn.disabled = true;
      btn.textContent = 'ログイン中…';
      PortalLogin.loginWithReference(data.email, data.ref).then(function (res) {
        if (res && res.ok) { location.replace('portal.html'); return; }
        btn.disabled = false;
        btn.textContent = 'ログイン';
        showError('メールアドレスまたは予約番号が正しくありません。');
      }).catch(function () {
        btn.disabled = false;
        btn.textContent = 'ログイン';
        showError('接続エラーが発生しました。しばらくしてから再度お試しください。');
      });
    })();

    // Deep-link prefill: the post-booking「チャットで相談する」CTA — and the
    // 「担当者とチャットする」button in lifecycle emails — send the customer here
    // as login.html?ref=<reference>[&view=chat]. Prefill the reference field so
    // they only need to add their email; when view=chat is present, stash the
    // chat intent in sessionStorage (the SAME keys the success-screen CTA uses)
    // so portal.html opens the Chat tab straight after login.
    (function prefillReferenceFromQuery() {
      try {
        var qs    = new URLSearchParams(location.search);
        var qref  = qs.get('ref');
        var refEl = document.getElementById('reference');
        if (qref && refEl && !refEl.value) { refEl.value = qref.trim(); if (emailEl) emailEl.focus(); }
        if ((qs.get('view') || '').toLowerCase() === 'chat') {
          sessionStorage.setItem('hm_after_login_view', 'chat');
          if (qref) sessionStorage.setItem('hm_after_login_ref', qref.trim());
        }
      } catch (_) {}
    })();

    // Already authenticated (persisted API session) → go to the portal.
    (async function () {
      try {
        if (window.PortalLogin && PortalLogin.isConfigured()) {
          const s = await PortalLogin.waitForSession(0);
          if (s) { location.replace('portal.html'); return; }
        }
        // Honour any legacy session that may still be open.
        if (window.PortalAuth && PortalAuth.getSession()) { location.replace('portal.html'); }
      } catch (_) {}
    })();

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      clearError();

      const email = document.getElementById('email').value.trim();
      const ref   = document.getElementById('reference').value.trim();
      const admin = _isAdmin(email);
      if (!email) { showError('メールアドレスを入力してください。'); return; }
      if (!admin && !ref) { showError('メールアドレスと予約番号を入力してください。'); return; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError('正しいメールアドレスを入力してください。'); return; }

      if (!window.PortalLogin || !PortalLogin.isConfigured()) {
        showError('現在ログインできません。しばらくしてから再度お試しください。');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'ログイン中…';

      try {
        // Validates email + reference server-side and installs a REAL API
        // session (no email sent) so Phase 6B RLS stays enforced in the portal.
        const res = await PortalLogin.loginWithReference(email, ref);
        if (!res.ok) {
          // Generic message for invalid pairs (anti-enumeration); specific copy
          // only for client-side input / availability problems.
          let msg;
          if (res.error === 'bad-email') msg = '正しいメールアドレスを入力してください。';
          else if (res.error === 'rate-limited') msg = '試行回数が上限に達しました。しばらくしてから再度お試しください。';
          else if (res.error === 'unavailable' || res.error === 'server-misconfigured') msg = '現在ログインできません。しばらくしてから再度お試しください。';
          else msg = 'メールアドレスまたは予約番号が正しくありません。';
          showError(msg);
          btn.disabled = false;
          btn.textContent = 'ログイン';
          return;
        }
        // Success — a real API session is now set. Enter the portal.
        location.replace('portal.html');
      } catch (err) {
        console.error('[Portal login]', err);
        showError('接続エラーが発生しました。しばらくしてから再度お試しください。');
        btn.disabled = false;
        btn.textContent = 'ログイン';
      }
    });
  })();
  </script>
</body>
</html>
