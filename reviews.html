<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#2C3626" />
<meta name="description" content="Hello Moving をご利用いただいたお客様からの口コミ一覧。認証済みの実際のご感想をご覧いただけます。" />
<title>お客様の口コミ — Hello Moving</title>
<link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --forest: #2C3626;
    --sage:   #9AB57A;
    --cream:  #F9F9F6;
    --ink:    #2C3626;
    --muted:  #6b7169;
    --line:   #e6e7e2;
    --font-serif: "DM Serif Display", "Noto Serif JP", serif;
    --font-sans:  "DM Sans", "Noto Sans JP", -apple-system, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font-sans);
    color: var(--ink);
    background: var(--cream);
    line-height: 1.75;
    -webkit-font-smoothing: antialiased;
    padding-bottom: 88px;   /* room for the fixed CTA bar */
  }
  a { color: inherit; text-decoration: none; }

  /* ── Header ── */
  .rv-header {
    position: sticky; top: 0; z-index: 20;
    display: flex; align-items: center; gap: 12px;
    padding: 14px 20px;
    background: rgba(249, 249, 246, .9);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line);
  }
  .rv-logo { width: 34px; height: 34px; border-radius: 9px; }
  .rv-brand { font-family: var(--font-sans); font-weight: 700; font-size: 14px; letter-spacing: .16em; text-transform: uppercase; color: var(--forest); }
  .rv-back { margin-left: auto; font-size: 13px; font-weight: 600; color: var(--muted); padding: 8px 14px; border: 1px solid var(--line); border-radius: 999px; background: #fff; transition: .2s; }
  .rv-back:hover { border-color: var(--forest); color: var(--forest); }

  /* ── Hero ── */
  .rv-hero { text-align: center; padding: 48px 20px 26px; }
  .rv-eyebrow { font-size: 12px; font-weight: 700; letter-spacing: .22em; text-transform: uppercase; color: var(--sage); }
  .rv-title { font-family: var(--font-serif); font-size: 36px; line-height: 1.2; color: var(--forest); margin: 10px 0 8px; }
  .rv-sub { font-size: 14.5px; color: var(--muted); max-width: 560px; margin: 0 auto; }
  .rv-summary { display: inline-flex; align-items: center; gap: 10px; margin-top: 20px; padding: 10px 20px; background: #fff; border: 1px solid var(--line); border-radius: 999px; font-size: 13.5px; }
  .rv-summary strong { font-size: 20px; color: var(--forest); font-family: var(--font-serif); }
  .rv-summary .rv-sum-stars { color: #f5a623; letter-spacing: .06em; }

  /* ── Grid ── */
  .rv-wrap { max-width: 1080px; margin: 0 auto; padding: 24px 20px 40px; }
  .rv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 18px; }
  .rv-card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 22px 22px 18px;
    display: flex; flex-direction: column;
    transition: box-shadow .2s, transform .2s;
  }
  .rv-card:hover { box-shadow: 0 12px 34px rgba(44, 54, 38, .08); transform: translateY(-2px); }
  .rv-card-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
  .rv-stars { color: #f5a623; font-size: 15px; letter-spacing: .08em; }
  .rv-verified {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 700; color: var(--forest);
    background: rgba(154, 181, 122, .22);
    padding: 3px 10px; border-radius: 999px; white-space: nowrap;
  }
  .rv-comment { font-size: 14.5px; color: #3a4034; line-height: 1.85; flex: 1; white-space: pre-wrap; word-break: break-word; }
  .rv-meta { font-size: 12px; color: var(--muted); margin-top: 8px; }
  .rv-foot { display: flex; align-items: center; gap: 11px; margin-top: 16px; padding-top: 14px; border-top: 1px solid #f2f2ee; }
  .rv-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--forest); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; font-family: var(--font-serif); flex-shrink: 0; }
  .rv-name { font-size: 14px; font-weight: 600; color: var(--ink); }

  .rv-state { text-align: center; padding: 70px 20px; color: var(--muted); font-size: 14px; }

  /* ── Bottom CTA block ── */
  .rv-cta-block { text-align: center; margin: 46px auto 10px; max-width: 640px; padding: 0 20px; }
  .rv-cta-block h2 { font-family: var(--font-serif); font-size: 26px; color: var(--forest); margin-bottom: 10px; }
  .rv-cta-block p { font-size: 14px; color: var(--muted); margin-bottom: 22px; }
  .rv-cta-btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 9px;
    padding: 17px 44px; border-radius: 999px;
    background: var(--forest); color: #fff;
    font-size: 17px; font-weight: 700;
    box-shadow: 0 10px 26px rgba(44, 54, 38, .26);
    transition: transform .18s, box-shadow .18s, background .18s;
  }
  .rv-cta-btn:hover { background: #3a4a30; transform: translateY(-2px); box-shadow: 0 14px 32px rgba(44, 54, 38, .32); }

  /* ── Fixed footer CTA bar ── */
  .rv-fixed-cta {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 30;
    display: flex; align-items: center; justify-content: space-between; gap: 14px;
    padding: 12px 20px;
    background: rgba(255, 255, 255, .94);
    backdrop-filter: blur(10px);
    border-top: 1px solid var(--line);
  }
  .rv-fixed-cta .rv-fixed-text { font-size: 13px; font-weight: 600; color: var(--forest); }
  .rv-fixed-cta .rv-fixed-text span { display: block; font-size: 11px; font-weight: 400; color: var(--muted); }
  .rv-fixed-btn {
    flex-shrink: 0;
    padding: 13px 28px; border-radius: 999px;
    background: var(--forest); color: #fff; font-size: 15px; font-weight: 700;
    box-shadow: 0 6px 16px rgba(44, 54, 38, .24); transition: .18s;
  }
  .rv-fixed-btn:hover { background: #3a4a30; transform: translateY(-1px); }

  @media (max-width: 560px) {
    .rv-title { font-size: 28px; }
    .rv-hero { padding: 34px 18px 20px; }
    .rv-fixed-cta .rv-fixed-text { display: none; }
    .rv-fixed-cta { justify-content: center; }
    .rv-fixed-btn { width: 100%; text-align: center; }
    .rv-cta-btn { width: 100%; }
  }
</style>
</head>
<body>
  <header class="rv-header">
    <img class="rv-logo" src="/icons/icon.svg" alt="Hello Moving" />
    <span class="rv-brand">Hello Moving</span>
    <a class="rv-back" href="index.html">← ホームへ戻る</a>
  </header>

  <section class="rv-hero">
    <div class="rv-eyebrow">口コミ</div>
    <h1 class="rv-title">お客様の口コミ</h1>
    <p class="rv-sub">Hello Moving を実際にご利用いただいたお客様からの、認証済みのご感想です。</p>
    <div class="rv-summary" id="rvSummary" style="display:none">
      <strong id="rvAvg">—</strong>
      <span class="rv-sum-stars" id="rvAvgStars"></span>
      <span id="rvCount"></span>
    </div>
  </section>

  <main class="rv-wrap">
    <div class="rv-grid" id="rvGrid"></div>
    <div class="rv-state" id="rvState">口コミを読み込んでいます…</div>

    <div class="rv-cta-block">
      <h2>お引越しをご検討中ですか？</h2>
      <p>最短2時間でご返信。まずはお気軽に無料お見積りをどうぞ。</p>
      <a class="rv-cta-btn" href="index.html#booking">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        無料見積もり
      </a>
    </div>
  </main>

  <div class="rv-fixed-cta">
    <div class="rv-fixed-text">お引越しのご相談<span>14年の実績・国交省認可</span></div>
    <a class="rv-fixed-btn" href="index.html#booking">無料見積もり</a>
  </div>

  <!-- Self-hosted data client (PHP + MySQL API) -->
  <script src="js/services/diagnostics.js"></script>
  <script src="js/lib/apiClient.js"></script>
  <script src="js/config/appConfig.js"></script>
  <script src="js/config/env.public.js"></script><!-- committed same-origin fallback -->
  <script src="js/config/env.js" onerror="console.warn('[Reviews] env.js missing — using env.public.js fallback')"></script>
  <script src="js/services/dataClient.js"></script>
  <script>
  (function () {
    'use strict';
    var grid = document.getElementById('rvGrid');
    var state = document.getElementById('rvState');

    function esc(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
        return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
      });
    }
    function stars(n) {
      n = Math.max(0, Math.min(5, parseInt(n, 10) || 5));
      return '★'.repeat(n) + '☆'.repeat(5 - n);
    }
    function fmtDate(iso) {
      if (!iso) return '';
      var d = new Date(iso);
      if (isNaN(d)) return '';
      return d.getFullYear() + '年' + (d.getMonth() + 1) + '月';
    }

    function card(r) {
      var name = esc(r.customer_name || 'ご利用者');
      var initial = esc((r.customer_name || '?').charAt(0));
      // 認証済み ONLY for reviews linked to a real booking (booking_reference).
      var verified = r.booking_reference
        ? '<span class="rv-verified">✓ 認証済み</span>' : '';
      var meta = [r.service, r.date_label || fmtDate(r.created_at), r.location]
        .filter(Boolean).map(esc).join(' ・ ');
      return '' +
        '<article class="rv-card">' +
          '<div class="rv-card-top"><span class="rv-stars">' + stars(r.rating) + '</span>' + verified + '</div>' +
          '<p class="rv-comment">' + esc(r.review_text || '') + '</p>' +
          (meta ? '<div class="rv-meta">' + meta + '</div>' : '') +
          '<div class="rv-foot"><span class="rv-avatar">' + initial + '</span>' +
            '<span class="rv-name">' + name + ' 様</span></div>' +
        '</article>';
    }

    function summary(rows) {
      if (!rows.length) return;
      var sum = rows.reduce(function (a, r) { return a + (parseInt(r.rating, 10) || 0); }, 0);
      var avg = (sum / rows.length);
      document.getElementById('rvAvg').textContent = avg.toFixed(1);
      document.getElementById('rvAvgStars').textContent = stars(Math.round(avg));
      document.getElementById('rvCount').textContent = rows.length + '件の口コミ';
      document.getElementById('rvSummary').style.display = 'inline-flex';
    }

    async function load() {
      if (!window.api) { state.textContent = '口コミを読み込めませんでした。'; return; }
      var res;
      try {
        // Public rule: only APPROVED reviews are ever rendered. Newest first.
        res = await window.api.from('reviews')
          .select('id,reference_id,customer_name,rating,review_text,approved,published,service,date_label,location,booking_reference,created_at')
          .eq('approved', true)
          .order('created_at', { ascending: false });
      } catch (e) {
        state.textContent = '口コミを読み込めませんでした。'; return;
      }
      if (res.error) { state.textContent = '口コミを読み込めませんでした。'; return; }
      var rows = (res.data || []).filter(function (r) { return r.approved && (r.review_text || '').trim(); });
      if (!rows.length) { state.textContent = 'まだ口コミはありません。'; return; }
      state.style.display = 'none';
      grid.innerHTML = rows.map(card).join('');
      summary(rows);
    }
    load();
  })();
  </script>
</body>
</html>
